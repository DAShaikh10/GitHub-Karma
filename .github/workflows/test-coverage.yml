name: Test and Coverage

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: test-coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Bun Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        env:
          HUSKY: 0
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        run: bun run test:coverage

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          set -euo pipefail
          mkdir -p assets/badges

          lcov_file="coverage/lcov.info"
          if [ ! -f "$lcov_file" ]; then
            lcov_file=$(find . -type f -name 'lcov.info' -path '*/coverage/*' | head -n 1 || true)
          fi

          if [ -z "${lcov_file:-}" ] || [ ! -f "$lcov_file" ]; then
            echo "lcov file not found. Skipping coverage badge generation."
            exit 0
          fi

          total_lines=$(awk -F: '/^LF:/{sum+=$2} END{print sum+0}' "$lcov_file")
          covered_lines=$(awk -F: '/^LH:/{sum+=$2} END{print sum+0}' "$lcov_file")

          if [ "$total_lines" -eq 0 ]; then
            coverage_pct="0.00"
          else
            coverage_pct=$(awk -v c="$covered_lines" -v t="$total_lines" 'BEGIN { printf "%.2f", (c / t) * 100 }')
          fi

          coverage_int=${coverage_pct%.*}
          color="red"
          if [ "$coverage_int" -ge 90 ]; then
            color="brightgreen"
          elif [ "$coverage_int" -ge 80 ]; then
            color="green"
          elif [ "$coverage_int" -ge 70 ]; then
            color="yellow"
          elif [ "$coverage_int" -ge 60 ]; then
            color="orange"
          fi

          if ! curl -fsSL "https://img.shields.io/badge/coverage-${coverage_pct}%25-${color}?style=flat-square" -o assets/badges/coverage.svg; then
            echo "Could not reach shields.io. Keeping existing badge."
            exit 0
          fi

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain -- assets/badges/coverage.svg)" ]]; then
            echo "Coverage badge unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/badges/coverage.svg
          git commit -m "chore(ci): update coverage badge [skip ci]"
          git push

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14
